<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width , initial-scale=1.0">
  <meta name="description" content="Restaurant contact Page">
  <title>Contact Page | Restaurant website</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="form_container" aria-autocomplete="none">
    <form>
      <label for="name">Name</label>
        <input type="text" name="name" id="name" placeholder="Enter Name" required>
      
      <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter mail" required>
      
      <label for="contact">Contact</label>
        <input type="tel" name="contact" maxlength="10" id="contact" placeholder="Enter contact Number" required>

       

         <button type="reset">Reset</button>
         <button type="submit">Submit</button>
    </form>
  </div>
</body>

</html>
